version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: ../infrastructure/docker/Dockerfile.frontend
    ports:
      - "3000:3000"
    env_file: ./frontend/.env.example
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: ../infrastructure/docker/Dockerfile.backend
    ports:
      - "3001:3001"
    env_file: ./backend/.env.example
    depends_on:
      - ai-service

  ai-service:
    build:
      context: ./ai-service
      dockerfile: ../infrastructure/docker/Dockerfile.ai
    ports:
      - "8000:8000"
    env_file: ./ai-service/.env.example
